name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ------------------------------------------------------------------ #
  # 1. Unit / integration tests (lefthook: fmt + clippy + cargo test)  #
  # ------------------------------------------------------------------ #
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.12.0
        with:
          enable-cache: 'true'
      - name: Setup toolchains via devbox
        run: devbox run -- cargo --version
      - name: Install lefthook via npm (volta)
        run: devbox run -- npm install -g @evilmartians/lefthook
      - name: Check Formatting (Lefthook)
        run: devbox run -- lefthook run pre-commit
      - name: Run tests
        run: devbox run -- cargo test

  # ------------------------------------------------------------------ #
  # 2. Build mille.wasm (wasm32-wasip1)                                #
  #    Requires wasi-sdk-30 for tree-sitter C cross-compilation.       #
  # ------------------------------------------------------------------ #
  build-wasm:
    name: Build mille.wasm (wasm32-wasip1)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (with wasm32-wasip1 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      # NOTE: tree-sitter compiles C via cc crate. For wasm32-wasip1,
      #       the Nix-wrapped clang cannot be used (injects glibc sysroot).
      #       wasi-sdk-30 provides a self-contained clang + WASI sysroot.
      #       -Wno-implicit-function-declaration suppresses the dup() error
      #       in ts_tree_print_dot_graph (dead code; removed by --gc-sections).
      - name: Download wasi-sdk-30
        run: |
          WASI_VER=30
          ARCHIVE="wasi-sdk-${WASI_VER}.0-x86_64-linux.tar.gz"
          curl -fsSL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VER}/${ARCHIVE}" \
            | tar xz
          echo "WASI_SDK_PATH=$PWD/wasi-sdk-${WASI_VER}.0-x86_64-linux" >> "$GITHUB_ENV"

      - name: Build mille.wasm
        run: |
          export CC_wasm32_wasip1="${WASI_SDK_PATH}/bin/clang"
          export AR_wasm32_wasip1="${WASI_SDK_PATH}/bin/llvm-ar"
          export CFLAGS_wasm32_wasip1="--sysroot=${WASI_SDK_PATH}/share/wasi-sysroot -Wno-implicit-function-declaration"
          cargo build --target wasm32-wasip1 --release

      # NOTE: Overwrite the committed packages/wasm/mille.wasm with the fresh
      #       CI build and use `git diff --exit-code` to detect any divergence.
      #       packages/wasm is the ONLY committed copy of the .wasm file;
      #       packages/go imports it as a Go module dependency (no copy there).
      #       A non-empty diff means the committed .wasm is out of sync with
      #       the current Rust source. The developer must run
      #       `bash scripts/build-wasm.sh` and re-commit.
      - name: Verify committed mille.wasm matches CI build
        run: |
          cp target/wasm32-wasip1/release/mille.wasm packages/wasm/mille.wasm
          if ! git diff --exit-code packages/wasm/mille.wasm; then
            echo ""
            echo "ERROR: Committed packages/wasm/mille.wasm is out of sync with the current Rust source."
            echo "Run the following locally and push the updated file:"
            echo ""
            echo "  bash scripts/build-wasm.sh"
            echo "  git add packages/wasm/mille.wasm"
            echo "  git commit -m '[fix] mille.wasm を更新 because of Rust ソース変更'"
            exit 1
          fi

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: mille-wasm
          path: packages/wasm/mille.wasm
          retention-days: 7

  # ------------------------------------------------------------------ #
  # 3a. Dogfooding-rust — cargo build → mille check on all projects   #
  # ------------------------------------------------------------------ #
  dogfood-rust:
    name: Dogfooding-rust (mille check)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build mille (release)
        run: cargo build --release

      - name: Self-check — Rust project
        run: ./target/release/mille check

      - name: Self-check — Go fixture (tests/fixtures/go_sample)
        working-directory: tests/fixtures/go_sample
        run: ${{ github.workspace }}/target/release/mille check

      - name: Self-check — Go wrapper (packages/go)
        working-directory: packages/go
        run: ${{ github.workspace }}/target/release/mille check

  # ------------------------------------------------------------------ #
  # 3b. Dogfooding-go — wazero wrapper → mille check                  #
  #   The .wasm built in build-wasm is embedded via //go:embed.        #
  #   No network access or binary seeding is required.                 #
  # ------------------------------------------------------------------ #
  dogfood-go:
    name: Dogfooding-go (wazero wrapper + mille check)
    # NOTE: depends on build-wasm so this job is skipped when the committed
    #       .wasm is stale. build-wasm verifies committed == CI build, so the
    #       checked-out .wasm is guaranteed correct here — no artifact download needed.
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/go/go.mod

      - name: go test — packages/go
        working-directory: packages/go
        run: go test -v -timeout 60s ./...

      - name: go build — packages/go
        working-directory: packages/go
        run: go build -o mille_go .

      - name: Self-check via wazero wrapper — Go fixture
        working-directory: tests/fixtures/go_sample
        run: ${{ github.workspace }}/packages/go/mille_go check

      - name: Self-check via wazero wrapper — packages/go itself
        working-directory: packages/go
        run: ./mille_go check
