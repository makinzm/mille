[project]
name = "mille"
root = "."
languages = ["rust"]

[[layers]]
name = "domain"
paths = ["src/domain/**"]
dependency_mode = "opt-out"
allow = []
deny = ["infrastructure", "usecase", "presentation"]
external_mode = "opt-in"
external_allow = ["serde"]
name_deny = ["python", "go", "java", "kotlin", "javascript", "typescript", "ruby", "php", "csharp", "cpp", "rust"]
name_allow = ["category", "algorithm", "diagonal", "cargo", "ergonomic"]

[[layers]]
name = "infrastructure"
paths = ["src/infrastructure/**"]
dependency_mode = "opt-in"
allow = ["domain"]
external_mode = "opt-in"
external_allow = ["serde", "toml", "tree_sitter", "glob"]

[[layers]]
name = "usecase"
paths = ["src/usecase/**"]
dependency_mode = "opt-in"
allow = ["domain"]
external_mode = "opt-in"
external_allow = []
name_deny = ["python", "go", "java", "kotlin", "javascript", "typescript", "ruby", "php", "csharp", "cpp", "rust"]
name_allow = ["algorithm", "category", "cargo", "ergonomic"]

[[layers]]
name = "presentation"
paths = ["src/presentation/**"]
dependency_mode = "opt-in"
allow = ["usecase", "domain"]
external_mode = "opt-in"
external_allow = ["clap"]

[[layers]]
name = "main"
paths = ["src/main.rs"]
dependency_mode = "opt-in"
allow = ["domain", "infrastructure", "usecase", "presentation"]
external_mode = "opt-in"
external_allow = ["clap"]

  [[layers.allow_call_patterns]]
  callee_layer = "usecase"
  allow_methods = ["check", "detect_languages", "infer_layers", "generate_toml", "is_excluded_dir"]

  [[layers.allow_call_patterns]]
  callee_layer = "presentation"
  allow_methods = ["parse"]
