[project]
name = "mille-go-wrapper"
root = "."
languages = ["go"]

[resolve.go]
module_name = "github.com/makinzm/mille/packages/go"

# NOTE: packages/go embeds mille.wasm and runs it via wazero (WASI runtime).
# This is a single-layer utility wrapper — external dependencies are unrestricted.
[[layers]]
name = "main"
paths = ["*.go"]
dependency_mode = "opt-out"
deny = []
external_mode = "opt-out"
external_deny = []
