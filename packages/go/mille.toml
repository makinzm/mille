[project]
name = "mille-go-wrapper"
root = "."
languages = ["go"]

[resolve.go]
module_name = "github.com/makinzm/mille/packages/go"

# NOTE: packages/go embeds mille.wasm and runs it via wazero (WASI runtime).
# wazero and its transitive dep golang.org/x/sys are the only external packages.
[[layers]]
name = "main"
paths = ["."]
dependency_mode = "opt-out"
deny = []
external_mode = "opt-in"
external_allow = ["github.com/tetratelabs/wazero", "golang.org/x/sys"]
