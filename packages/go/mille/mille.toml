[project]
name = "mille-go-wrapper"
root = "."
languages = ["go"]

[resolve.go]
module_name = "github.com/makinzm/mille/packages/go/mille"

# NOTE: packages/go embeds mille.wasm and runs it via wazero (WASI runtime).
# external_allow uses exact import path matching — no regex escaping needed.
[[layers]]
name = "main"
paths = ["*.go"]
dependency_mode = "opt-out"
deny = []
external_mode = "opt-in"
external_allow = [
  "context",
  "embed",
  "fmt",
  "os",
  "path/filepath",
  "strings",
  "testing",
  "github.com/tetratelabs/wazero",
  "github.com/tetratelabs/wazero/imports/wasi_snapshot_preview1",
  "github.com/tetratelabs/wazero/sys",
]
