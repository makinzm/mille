[project]
name = "java_maven_sample"
root = "."
languages = ["java"]

[resolve.java]
module_name = "com.example.myapp"

[[layers]]
name = "domain"
paths = ["**/domain/**"]
dependency_mode = "opt-in"
external_mode = "opt-in"

[[layers]]
name = "infrastructure"
paths = ["**/infrastructure/**"]
dependency_mode = "opt-in"
allow = ["domain"]
external_mode = "opt-in"
external_allow = ["java.util.List"]

[[layers]]
name = "usecase"
paths = ["**/usecase/**"]
dependency_mode = "opt-in"
allow = ["domain"]
external_mode = "opt-in"

[[layers]]
name = "main"
paths = ["**/main/**"]
dependency_mode = "opt-in"
allow = ["domain", "infrastructure", "usecase"]
external_mode = "opt-in"
