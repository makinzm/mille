[project]
name = "kotlinsample"
root = "."
languages = ["kotlin"]

[resolve.java]
module_name = "com.example.kotlinsample"

[[layers]]
name = "domain"
paths = ["**/domain/**"]
dependency_mode = "opt-out"
deny = ["usecase", "infrastructure"]
external_mode = "opt-in"
external_allow = []

[[layers]]
name = "usecase"
paths = ["**/usecase/**"]
dependency_mode = "opt-in"
allow = ["domain"]
external_mode = "opt-out"

[[layers]]
name = "infrastructure"
paths = ["**/infrastructure/**"]
dependency_mode = "opt-in"
allow = ["domain"]
external_mode = "opt-out"

[[layers]]
name = "main"
paths = ["**/main/**"]
dependency_mode = "opt-in"
allow = ["domain", "usecase", "infrastructure"]
external_mode = "opt-out"
